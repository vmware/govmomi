---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: virtualmachines.vim.vmware.com
spec:
  group: vim.vmware.com
  names:
    kind: VirtualMachine
    listKind: VirtualMachineList
    plural: virtualmachines
    shortNames:
    - vm
    singular: virtualmachine
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          VirtualMachine is the schema for the
          VirtualMachine API and
          represents the desired state and observed status of a
          VirtualMachine resource.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: VirtualMachineSpec defines the desired state of a VirtualMachine.
            properties:
              config:
                description: |-
                  VirtualMachineConfigInfoSpec encapsulates the configuration settings and
                  virtual hardware for a virtual machine.
                  It corresponds to vim.vm.ConfigInfo.
                properties:
                  alternateGuestName:
                    description: |-
                      AlternateGuestName is used as the display name for the operating
                      system if GuestID is "other" or "other-64".
                    type: string
                  annotation:
                    description: Annotation is a description for the virtual machine.
                    type: string
                  bootOptions:
                    description: BootOptions defines the boot-time behavior of the
                      virtual machine.
                    properties:
                      bootDelay:
                        description: |-
                          BootDelay is the delay in milliseconds before starting the boot
                          sequence. The boot delay specifies a time interval between virtual
                          machine power on or restart and the beginning of the boot sequence.
                        format: int64
                        type: integer
                      bootOrder:
                        description: |-
                          BootOrder is the boot order. Listed devices are used for booting.
                          After the list is exhausted, the default BIOS boot device
                          algorithm is used. The order of entries is significant: the first
                          device is tried first, then the second, and so on.
                        items:
                          description: |-
                            VirtualMachineBootOptionsBootableDevice represents a device in the boot
                            order for a virtual machine.
                            It corresponds to vim.vm.BootOptions.BootableDevice and its subtypes
                            (BootableCdromDevice, BootableDiskDevice, BootableEthernetDevice,
                            BootableFloppyDevice).
                          properties:
                            deviceKey:
                              description: |-
                                DeviceKey is the device key of the bootable device.
                                Only applicable when Type is Disk or Ethernet; it references the
                                key property of the corresponding virtual device.
                              format: int32
                              type: integer
                            type:
                              description: Type identifies the concrete bootable device
                                type.
                              enum:
                              - Cdrom
                              - Disk
                              - Ethernet
                              - Floppy
                              type: string
                          required:
                          - type
                          type: object
                        type: array
                      bootRetryDelay:
                        description: |-
                          BootRetryDelay is the delay in milliseconds before a boot retry.
                          The virtual machine uses this value only if BootRetryEnabled is
                          true.
                        format: int64
                        type: integer
                      bootRetryEnabled:
                        description: |-
                          BootRetryEnabled indicates whether a virtual machine that fails to
                          boot will try again after the BootRetryDelay time period has
                          expired. When false, the virtual machine waits indefinitely for
                          you to initiate boot retry.
                        type: boolean
                      efiSecureBootEnabled:
                        description: |-
                          EFISecureBootEnabled indicates whether the virtual machine's
                          firmware will perform signature checks of any EFI images loaded
                          during startup, and will refuse to start any images that do not
                          pass those signature checks.
                        type: boolean
                      enterBIOSSetup:
                        description: |-
                          EnterBIOSSetup indicates that the virtual machine automatically
                          enters BIOS setup the next time it boots. The virtual machine
                          resets this flag to false so that subsequent boots proceed
                          normally.
                        type: boolean
                      networkBootProtocol:
                        description: |-
                          NetworkBootProtocol is the protocol to attempt during PXE network
                          boot or NetBoot.
                        enum:
                        - ipv4
                        - ipv6
                        type: string
                    type: object
                  changeTrackingEnabled:
                    description: |-
                      ChangeTrackingEnabled indicates whether changed block tracking for
                      this VM's disks is active.
                    type: boolean
                  cpuAffinity:
                    description: |-
                      CPUAffinity defines the CPU affinity settings for this virtual
                      machine.
                    properties:
                      affinitySet:
                        description: |-
                          AffinitySet is the list of processors that may be used by the
                          virtual machine. An empty list removes any existing affinity.
                        items:
                          format: int32
                          type: integer
                        type: array
                    type: object
                  cpuAllocation:
                    description: CPUAllocation defines the resource limits for CPU.
                    properties:
                      expandableReservation:
                        description: |-
                          ExpandableReservation indicates whether the reservation can grow
                          beyond the specified value.
                        type: boolean
                      limit:
                        description: |-
                          Limit is the maximum allowed resource usage. Set to -1 for no
                          fixed limit. Units are MHz for CPU.
                        format: int64
                        type: integer
                      overheadLimit:
                        description: |-
                          OverheadLimit is the maximum allowed overhead resource reservation.
                          Units are MB.
                        format: int64
                        type: integer
                      reservation:
                        description: |-
                          Reservation is the guaranteed amount of resource available to the
                          virtual machine. Units are MHz for CPU.
                        format: int64
                        type: integer
                      shares:
                        description: Shares describes the resource shares used in
                          case of contention.
                        properties:
                          level:
                            description: |-
                              Level is the allocation level. Levels map to pre-determined numeric
                              share values.
                            enum:
                            - custom
                            - high
                            - low
                            - normal
                            type: string
                          shares:
                            description: |-
                              Shares is the number of shares allocated. Only meaningful when
                              Level is set to "custom".
                            format: int32
                            type: integer
                        required:
                        - level
                        - shares
                        type: object
                    type: object
                  cpuFeatureMask:
                    description: |-
                      CPUFeatureMask specifies CPU feature compatibility masks that
                      override the defaults from the virtual machine's guest OS
                      descriptor.
                    items:
                      description: |-
                        HostCPUIDInfo describes the CPU features of a host or the CPU feature
                        requirements of a virtual machine.
                        It corresponds to vim.host.CpuIdInfo.
                      properties:
                        eax:
                          description: EAX represents the required EAX bits as a formatted
                            bit mask string.
                          type: string
                        ebx:
                          description: EBX represents the required EBX bits as a formatted
                            bit mask string.
                          type: string
                        ecx:
                          description: ECX represents the required ECX bits as a formatted
                            bit mask string.
                          type: string
                        edx:
                          description: EDX represents the required EDX bits as a formatted
                            bit mask string.
                          type: string
                        level:
                          description: Level is the level (EAX input to CPUID).
                          format: int32
                          type: integer
                        vendor:
                          description: Vendor is the CPU vendor for which this mask
                            applies.
                          type: string
                      required:
                      - level
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  cpuHotAddEnabled:
                    description: |-
                      CPUHotAddEnabled indicates whether virtual processors can be added
                      while this virtual machine is running.
                    type: boolean
                  cpuHotRemoveEnabled:
                    description: |-
                      CPUHotRemoveEnabled indicates whether virtual processors can be
                      removed while this virtual machine is running.
                    type: boolean
                  defaultPowerOps:
                    description: |-
                      DefaultPowerOps defines the configured defaults for power operations
                      on the virtual machine.
                    properties:
                      defaultPowerOffType:
                        description: |-
                          DefaultPowerOffType is the default power-off operation: "soft",
                          "hard", or "preset".
                        type: string
                      defaultResetType:
                        description: |-
                          DefaultResetType is the default reset operation: "soft", "hard",
                          or "preset".
                        type: string
                      defaultSuspendType:
                        description: |-
                          DefaultSuspendType is the default suspend operation: "soft",
                          "hard", or "preset".
                        type: string
                      powerOffType:
                        description: PowerOffType is the advisory default power-off
                          type.
                        type: string
                      resetType:
                        description: ResetType is the advisory default reset type.
                        type: string
                      standbyAction:
                        description: |-
                          StandbyAction describes the behavior of the virtual machine when
                          it receives the S1 ACPI call.
                        type: string
                      suspendType:
                        description: SuspendType is the advisory default suspend type.
                        type: string
                    type: object
                  deviceGroups:
                    description: |-
                      DeviceGroups describes the assignable hardware device groups for
                      this virtual machine.
                    properties:
                      deviceGroup:
                        description: DeviceGroup is the list of device groups used
                          by this VM.
                        items:
                          description: |-
                            VirtualMachineVirtualDeviceGroupsDeviceGroup describes a device group
                            in a virtual machine.
                            It corresponds to vim.vm.VirtualDeviceGroups.DeviceGroup.
                          properties:
                            deviceInfo:
                              description: DeviceInfo provides a label and summary
                                for the device group.
                              properties:
                                label:
                                  description: Label is the display label.
                                  type: string
                                summary:
                                  description: Summary is the summary description.
                                  type: string
                              required:
                              - label
                              - summary
                              type: object
                            groupInstanceKey:
                              description: GroupInstanceKey is a unique integer identifying
                                this device group.
                              format: int32
                              type: integer
                          required:
                          - groupInstanceKey
                          type: object
                        type: array
                    type: object
                  deviceSwap:
                    description: DeviceSwap reports the current status of the device
                      swap feature.
                    properties:
                      lsiToPvscsi:
                        description: |-
                          LsiToPvscsi describes the status of LSI Logic to ParaVirtual SCSI
                          controller swap.
                        properties:
                          applicable:
                            description: |-
                              Applicable indicates whether the swap operation is applicable to
                              this virtual machine.
                            type: boolean
                          enabled:
                            description: |-
                              Enabled indicates whether the swap operation is enabled for this
                              virtual machine.
                            type: boolean
                          status:
                            description: Status is the status of the operation.
                            type: string
                        type: object
                    type: object
                  extraConfig:
                    description: |-
                      ExtraConfig contains additional configuration information for the
                      virtual machine.
                    items:
                      description: |-
                        OptionValue is a key-value configuration parameter.
                        It corresponds to vim.option.OptionValue.
                      properties:
                        key:
                          description: Key is the option key.
                          type: string
                        value:
                          description: Value is the option value, encoded as a string.
                          type: string
                      required:
                      - key
                      - value
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  files:
                    description: |-
                      Files describes the locations of files associated with the virtual
                      machine.
                    properties:
                      ftMetadataDirectory:
                        description: |-
                          FTMetadataDirectory is the path to the directory for fault
                          tolerance metadata files.
                        type: string
                      logDirectory:
                        description: |-
                          LogDirectory is the path to the directory for log files. Defaults
                          to the same directory as the configuration file.
                        type: string
                      snapshotDirectory:
                        description: |-
                          SnapshotDirectory is the path to the directory that holds suspend
                          and snapshot files belonging to the virtual machine.
                        type: string
                      suspendDirectory:
                        description: SuspendDirectory is the path to the directory
                          for suspend files.
                        type: string
                      vmPathName:
                        description: |-
                          VMPathName is the path to the configuration file for the virtual
                          machine, e.g., the .vmx file. This also implicitly defines the
                          configuration directory.
                        type: string
                    type: object
                  firmware:
                    description: Firmware is the firmware type for this virtual machine.
                    enum:
                    - BIOS
                    - EFI
                    type: string
                  fixedPassthruHotPlugEnabled:
                    description: |-
                      FixedPassthruHotPlugEnabled indicates whether support to add and
                      remove fixed passthrough devices when the VM is running is enabled.
                    type: boolean
                  ftEncryptionMode:
                    description: |-
                      FTEncryptionMode describes whether encrypted Fault Tolerance is
                      required for this VM.
                    type: string
                  guestAutoLockEnabled:
                    description: |-
                      GuestAutoLockEnabled indicates whether the guest operating system
                      will logout any active sessions when there are no remote display
                      connections open to the virtual machine.
                    type: boolean
                  guestFullName:
                    description: |-
                      GuestFullName is the full name of the guest operating system for
                      the virtual machine. For example: Windows 2000 Professional.
                    type: string
                  guestId:
                    description: |-
                      GuestID is the guest operating system configured on a virtual
                      machine.
                    type: string
                  hardware:
                    description: |-
                      Hardware contains the processor, memory, and virtual device
                      configuration of the virtual machine.
                    properties:
                      autoCoresPerSocket:
                        description: |-
                          AutoCoresPerSocket indicates whether cores per socket is
                          automatically determined.
                        type: boolean
                      devices:
                        description: |-
                          - 100 SATA, 60 NVMe, 1024 SCSI, 4 IDE, 20 USB
                          - 4 IDE, 20 USB, 100 SATA
                        items:
                          description: |-
                            VirtualDevice is the base data object type for devices in a virtual machine.
                            It corresponds to vim.vm.device.VirtualDevice.
                          properties:
                            backing:
                              description: Backing describes the device's backing
                                information.
                              properties:
                                device:
                                  description: Device contains host device backing
                                    information.
                                  properties:
                                    cdromPassthrough:
                                      description: |-
                                        VirtualCdromPassthroughBackingInfo defines device pass-through backing for a
                                        virtual CD-ROM.
                                        It corresponds to vim.vm.device.VirtualCdrom.PassthroughBackingInfo.
                                      properties:
                                        exclusive:
                                          description: |-
                                            Exclusive indicates whether the virtual machine has exclusive CD-ROM
                                            device access.
                                          type: boolean
                                      required:
                                      - exclusive
                                      type: object
                                    deviceName:
                                      description: DeviceName is the name of the device
                                        on the host system.
                                      type: string
                                    diskRawDiskVer2:
                                      description: |-
                                        VirtualDiskRawDiskVer2BackingInfo defines raw host device (VMware Server)
                                        backing for a virtual disk.
                                        It corresponds to vim.vm.device.VirtualDisk.RawDiskVer2BackingInfo.
                                      properties:
                                        changeId:
                                          description: ChangeId is the change ID for
                                            tracking incremental changes.
                                          type: string
                                        descriptorFileName:
                                          description: DescriptorFileName is the name
                                            of the raw disk descriptor file.
                                          type: string
                                        partitioned:
                                          description: |-
                                            VirtualDiskPartitionedRawDiskVer2BackingInfo defines partitioned raw host
                                            device backing for a virtual disk.
                                            It corresponds to vim.vm.device.VirtualDisk.PartitionedRawDiskVer2BackingInfo.
                                          properties:
                                            partition:
                                              description: Partition is the list of
                                                partition indexes on the physical
                                                disk drive.
                                              items:
                                                format: int32
                                                type: integer
                                              type: array
                                          required:
                                          - partition
                                          type: object
                                        sharing:
                                          description: Sharing is the sharing mode
                                            of the virtual disk.
                                          type: string
                                        uuid:
                                          description: Uuid is the disk UUID.
                                          type: string
                                      required:
                                      - descriptorFileName
                                      type: object
                                    ethernetCardNetwork:
                                      description: |-
                                        VirtualEthernetCardNetworkBackingInfo defines standard network backing for
                                        a virtual Ethernet card.
                                        It corresponds to vim.vm.device.VirtualEthernetCard.NetworkBackingInfo.
                                      properties:
                                        network:
                                          description: |-
                                            ManagedObjectReference is a referenced to a managed object on a given
                                            vSphere instance.
                                          properties:
                                            id:
                                              description: ID is the object's ID.
                                              type: string
                                            serverID:
                                              description: ServerID is the ID of the
                                                server to which the object belongs.
                                              type: string
                                            type:
                                              description: Type is the object's type.
                                              type: string
                                          required:
                                          - id
                                          - type
                                          type: object
                                      type: object
                                    pciPassthroughDevice:
                                      description: |-
                                        VirtualPCIPassthroughDeviceBackingInfo contains information about the host
                                        PCI device backing for a PCI passthrough device.
                                        It corresponds to vim.vm.device.VirtualPCIPassthrough.DeviceBackingInfo.
                                      properties:
                                        deviceId:
                                          description: DeviceId is the PCI device
                                            ID.
                                          type: string
                                        id:
                                          description: Id is the PCI name ID, composed
                                            of "bus:slot.function".
                                          type: string
                                        systemId:
                                          description: SystemId is the ID of the system
                                            the PCI device is attached to.
                                          type: string
                                        vendorId:
                                          description: VendorId is the PCI vendor
                                            ID.
                                          type: integer
                                      required:
                                      - deviceId
                                      - id
                                      - systemId
                                      - vendorId
                                      type: object
                                    pciPassthroughDynamic:
                                      description: |-
                                        VirtualPCIPassthroughDynamicBackingInfo contains information about the
                                        Dynamic DirectPath PCI device backing.
                                        It corresponds to vim.vm.device.VirtualPCIPassthrough.DynamicBackingInfo.
                                      properties:
                                        allowedDevice:
                                          description: |-
                                            AllowedDevice lists the allowed PCI devices for this Dynamic DirectPath
                                            device.
                                          items:
                                            description: |-
                                              VirtualPCIPassthroughAllowedDevice specifies an allowed PCI device for
                                              Dynamic DirectPath.
                                              It corresponds to vim.vm.device.VirtualPCIPassthrough.AllowedDevice.
                                            properties:
                                              deviceId:
                                                description: DeviceId is the PCI device
                                                  ID.
                                                format: int32
                                                type: integer
                                              revisionId:
                                                description: RevisionId is the PCI
                                                  revision ID.
                                                format: int32
                                                type: integer
                                              subDeviceId:
                                                description: SubDeviceId is the PCI
                                                  subdevice ID.
                                                format: int32
                                                type: integer
                                              subVendorId:
                                                description: SubVendorId is the PCI
                                                  subvendor ID.
                                                format: int32
                                                type: integer
                                              vendorId:
                                                description: VendorId is the PCI vendor
                                                  ID.
                                                format: int32
                                                type: integer
                                            required:
                                            - deviceId
                                            - vendorId
                                            type: object
                                          type: array
                                        assignedId:
                                          description: AssignedId is the ID of the
                                            device assigned when the VM is powered
                                            on.
                                          type: string
                                        customLabel:
                                          description: CustomLabel is an optional
                                            label that the device must also have set.
                                          type: string
                                      type: object
                                    pointingDeviceDevice:
                                      description: |-
                                        VirtualPointingDeviceDeviceBackingInfo defines host mouse device backing for
                                        a virtual pointing device.
                                        It corresponds to vim.vm.device.VirtualPointingDevice.DeviceBackingInfo.
                                      properties:
                                        hostPointingDevice:
                                          description: |-
                                            HostPointingDevice defines the mouse type used to interact with the
                                            host mouse.
                                          type: string
                                      required:
                                      - hostPointingDevice
                                      type: object
                                    usbRemoteHost:
                                      description: |-
                                        VirtualUSBRemoteHostBackingInfo identifies a USB device on a specific ESX
                                        host, supporting persistent access across vMotion.
                                        It corresponds to vim.vm.device.VirtualUSB.RemoteHostBackingInfo.
                                      properties:
                                        hostname:
                                          description: |-
                                            Hostname is the name of the ESX host to which the physical USB device
                                            is attached.
                                          type: string
                                      required:
                                      - hostname
                                      type: object
                                    useAutoDetect:
                                      description: |-
                                        UseAutoDetect indicates whether the device should be auto-detected
                                        instead of directly specified. When true, DeviceName is ignored.
                                      type: boolean
                                  type: object
                                  x-kubernetes-validations:
                                  - message: at most one of cdromPassthrough, diskRawDiskVer2,
                                      ethernetCardNetwork, pciPassthroughDevice, pciPassthroughDynamic,
                                      pointingDeviceDevice, or usbRemoteHost may be
                                      specified
                                    rule: '[has(self.cdromPassthrough), has(self.diskRawDiskVer2),
                                      has(self.ethernetCardNetwork), has(self.pciPassthroughDevice),
                                      has(self.pciPassthroughDynamic), has(self.pointingDeviceDevice),
                                      has(self.usbRemoteHost)].filter(x, x).size()
                                      <= 1'
                                ethernetCardDistributedVirtualPort:
                                  description: |-
                                    EthernetCardDistributedVirtualPort contains DVS port backing
                                    information for virtual Ethernet cards.
                                  properties:
                                    port:
                                      description: Port is the distributed virtual
                                        switch port or portgroup connection.
                                      properties:
                                        connectionCookie:
                                          description: |-
                                            ConnectionCookie is a unique identifier for this port connection
                                            instance, assigned by the server.
                                          format: int32
                                          type: integer
                                        portKey:
                                          description: |-
                                            PortKey is the key of the specific port. Specify this to connect to a
                                            particular port rather than a portgroup.
                                          type: string
                                        portgroupKey:
                                          description: |-
                                            PortgroupKey is the key of the portgroup. Specify this to connect to a
                                            portgroup rather than a specific port.
                                          type: string
                                        switchUuid:
                                          description: SwitchUuid is the UUID of the
                                            distributed virtual switch.
                                          type: string
                                      required:
                                      - switchUuid
                                      type: object
                                  required:
                                  - port
                                  type: object
                                ethernetCardOpaqueNetwork:
                                  description: |-
                                    EthernetCardOpaqueNetwork contains opaque network backing
                                    information for virtual Ethernet cards.
                                  properties:
                                    opaqueNetworkId:
                                      description: OpaqueNetworkId is the opaque network
                                        identifier.
                                      type: string
                                    opaqueNetworkType:
                                      description: OpaqueNetworkType is the opaque
                                        network type.
                                      type: string
                                  required:
                                  - opaqueNetworkId
                                  - opaqueNetworkType
                                  type: object
                                file:
                                  description: File contains host file backing information.
                                  properties:
                                    backingObjectId:
                                      description: |-
                                        BackingObjectId is the backing object's durable and immutable
                                        identifier.
                                      type: string
                                    fileName:
                                      description: FileName is the filename for the
                                        host file used in this backing.
                                      type: string
                                    nvdimm:
                                      description: |-
                                        VirtualNVDIMMBackingInfo contains information about the file backing for a
                                        virtual NVDIMM device.
                                        It corresponds to vim.vm.device.VirtualNVDIMM.BackingInfo.
                                      properties:
                                        changeId:
                                          description: |-
                                            ChangeId is the change ID of the virtual NVDIMM for the corresponding
                                            snapshot, used to track incremental changes.
                                          type: string
                                        parent:
                                          type: object
                                          x-kubernetes-preserve-unknown-fields: true
                                      type: object
                                    virtualDiskFlatVer1:
                                      description: |-
                                        VirtualDiskFlatVer1BackingInfo defines flat-format (GSX Server 2.x) file
                                        backing for a virtual disk.
                                        It corresponds to vim.vm.device.VirtualDisk.FlatVer1BackingInfo.
                                      properties:
                                        contentId:
                                          description: |-
                                            ContentId indicates the logical contents of the disk backing and its
                                            parents.
                                          type: string
                                        diskMode:
                                          description: DiskMode is the disk persistence
                                            mode.
                                          type: string
                                        parent:
                                          description: Parent is the parent backing
                                            if this is a delta disk backing.
                                          type: object
                                          x-kubernetes-preserve-unknown-fields: true
                                        split:
                                          description: |-
                                            Split indicates whether the virtual disk is stored in multiple 2 GB
                                            files.
                                          type: boolean
                                        writeThrough:
                                          description: |-
                                            WriteThrough indicates whether writes go directly to the file system
                                            or are buffered.
                                          type: boolean
                                      required:
                                      - diskMode
                                      type: object
                                    virtualDiskFlatVer2:
                                      description: |-
                                        VirtualDiskFlatVer2BackingInfo defines flat-format (ESX Server 2.x/3.x)
                                        file backing for a virtual disk.
                                        It corresponds to vim.vm.device.VirtualDisk.FlatVer2BackingInfo.
                                      properties:
                                        changeId:
                                          description: ChangeId is the change ID for
                                            tracking incremental changes.
                                          type: string
                                        contentId:
                                          description: |-
                                            ContentId indicates the logical contents of the disk backing and its
                                            parents.
                                          type: string
                                        deltaDiskFormat:
                                          description: DeltaDiskFormat is the format
                                            of the delta disk.
                                          type: string
                                        deltaDiskFormatVariant:
                                          description: |-
                                            DeltaDiskFormatVariant provides more detailed information for the delta
                                            disk format.
                                          type: string
                                        deltaGrainSize:
                                          anyOf:
                                          - type: integer
                                          - type: string
                                          description: DeltaGrainSize is the grain
                                            size for seSparseFormat delta disks.
                                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                          x-kubernetes-int-or-string: true
                                        digestEnabled:
                                          description: |-
                                            DigestEnabled indicates whether the disk backing has digest file
                                            enabled.
                                          type: boolean
                                        diskMode:
                                          description: DiskMode is the disk persistence
                                            mode.
                                          type: string
                                        eagerlyScrub:
                                          description: |-
                                            EagerlyScrub indicates whether the backing file is completely scrubbed
                                            at creation time.
                                          type: boolean
                                        keyId:
                                          description: KeyId is the encryption key
                                            identifier for this disk backing.
                                          properties:
                                            keyId:
                                              description: KeyId is the unique key
                                                ID.
                                              type: string
                                            providerId:
