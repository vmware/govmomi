                      MaxMKSConnections is the maximum number of active remote display
                      connections that the virtual machine will support.
                    format: int32
                    type: integer
                  memoryAffinity:
                    description: |-
                      MemoryAffinity defines the memory affinity settings for this
                      virtual machine.

                      Deprecated: since vSphere 6.0.
                    properties:
                      affinitySet:
                        description: |-
                          AffinitySet is the list of processors that may be used by the
                          virtual machine. An empty list removes any existing affinity.
                        items:
                          format: int32
                          type: integer
                        type: array
                    type: object
                  memoryAllocation:
                    description: MemoryAllocation defines the resource limits for
                      memory.
                    properties:
                      expandableReservation:
                        description: |-
                          ExpandableReservation indicates whether the reservation can grow
                          beyond the specified value.
                        type: boolean
                      limit:
                        description: |-
                          Limit is the maximum allowed resource usage. Set to -1 for no
                          fixed limit. Units are MHz for CPU.
                        format: int64
                        type: integer
                      overheadLimit:
                        description: |-
                          OverheadLimit is the maximum allowed overhead resource reservation.
                          Units are MB.
                        format: int64
                        type: integer
                      reservation:
                        description: |-
                          Reservation is the guaranteed amount of resource available to the
                          virtual machine. Units are MHz for CPU.
                        format: int64
                        type: integer
                      shares:
                        description: Shares describes the resource shares used in
                          case of contention.
                        properties:
                          level:
                            description: |-
                              Level is the allocation level. Levels map to pre-determined numeric
                              share values.
                            enum:
                            - custom
                            - high
                            - low
                            - normal
                            type: string
                          shares:
                            description: |-
                              Shares is the number of shares allocated. Only meaningful when
                              Level is set to "custom".
                            format: int32
                            type: integer
                        required:
                        - level
                        - shares
                        type: object
                    type: object
                  memoryHotAddEnabled:
                    description: |-
                      MemoryHotAddEnabled indicates whether memory can be added while
                      the virtual machine is running.
                    type: boolean
                  memoryReservationLockedToMax:
                    description: |-
                      MemoryReservationLockedToMax indicates whether memory resource
                      reservation for this virtual machine will always be equal to the
                      virtual machine's memory size.
                    type: boolean
                  messageBusTunnelEnabled:
                    description: |-
                      MessageBusTunnelEnabled indicates whether tunneling of clients from
                      the guest VM into the common message bus on the host network is
                      allowed.
                    type: boolean
                  metroFtEnabled:
                    description: |-
                      MetroFTEnabled indicates whether FT Metro Cluster is enabled for
                      the VM.
                    type: boolean
                  metroFtHostGroup:
                    description: |-
                      MetroFTHostGroup indicates the Host Group for FT Metro Cluster
                      enabled virtual machines.
                    type: string
                  migrateEncryption:
                    description: |-
                      MigrateEncryption describes whether encrypted vMotion is required
                      for this VM.
                    type: string
                  name:
                    description: Name is the display name of the virtual machine.
                    type: string
                  nestedHVEnabled:
                    description: |-
                      NestedHVEnabled indicates whether this VM is configured to use
                      nested hardware-assisted virtualization.
                    type: boolean
                  npivDesiredNodeWwns:
                    description: |-
                      NPIVDesiredNodeWwns is the desired number of NPIV node WWNs to be
                      extended from the original list.
                    format: int32
                    type: integer
                  npivDesiredPortWwns:
                    description: |-
                      NPIVDesiredPortWwns is the desired number of NPIV port WWNs to be
                      extended from the original list.
                    format: int32
                    type: integer
                  npivNodeWorldWideName:
                    description: |-
                      NPIVNodeWorldWideName is a list of 64-bit node World Wide Names
                      (WWN). These are paired with NPIVPortWorldWideName to be used by
                      NPIV VPORTs instantiated for the virtual machine on the physical
                      HBAs of the host.
                    items:
                      format: int64
                      type: integer
                    type: array
                  npivOnNonRdmDisks:
                    description: |-
                      NPIVOnNonRdmDisks indicates whether NPIV can be enabled on the
                      virtual machine with non-RDM disks.
                    type: boolean
                  npivPortWorldWideName:
                    description: |-
                      NPIVPortWorldWideName is a list of 64-bit port World Wide Names
                      (WWN).
                    items:
                      format: int64
                      type: integer
                    type: array
                  npivTemporaryDisabled:
                    description: |-
                      NPIVTemporaryDisabled disables the NPIV capability on the virtual
                      machine temporarily. When set, NPIV VPORTs will not be instantiated
                      but WWNs in the configuration are preserved.
                    type: boolean
                  npivWorldWideNameType:
                    description: |-
                      NPIVWorldWideNameType is the source that provides/generates the
                      assigned WWNs.
                    type: string
                  numaInfo:
                    description: NumaInfo describes the virtual NUMA topology of the
                      virtual machine.
                    properties:
                      autoCoresPerNumaNode:
                        description: |-
                          AutoCoresPerNumaNode indicates whether the cores per NUMA node
                          are determined automatically.
                        type: boolean
                      coresPerNumaNode:
                        description: CoresPerNumaNode is the number of cores per virtual
                          NUMA node.
                        format: int32
                        type: integer
                      vnumaOnCpuHotaddExposed:
                        description: |-
                          VnumaOnCpuHotaddExposed indicates whether the virtual NUMA
                          topology is exposed when CPU hot-add is enabled.
                        type: boolean
                    type: object
                  pmemFailoverEnabled:
                    description: |-
                      PMEMFailoverEnabled indicates whether VMs configured to use PMem
                      will be failed over to other hosts by HA.

                      Deprecated: as of vSphere 9.0 APIs with no replacement.
                    type: boolean
                  rebootPowerOff:
                    description: |-
                      RebootPowerOff indicates whether the next reboot will result in a
                      power off.
                    type: boolean
                  repConfig:
                    description: |-
                      RepConfig contains the vSphere Replication settings for this
                      virtual machine.
                    properties:
                      dataSetsReplicationEnabled:
                        description: |-
                          DataSetsReplicationEnabled indicates whether DataSets files are
                          replicated.
                        type: boolean
                      destination:
                        description: |-
                          Destination is the IP address of the HBR server in the secondary
                          site.
                        type: string
                      disk:
                        description: Disk is the set of virtual disks configured for
                          replication.
                        items:
                          description: |-
                            ReplicationInfoDiskSettings encapsulates the replication properties of
                            a replicated virtual disk.
                            It corresponds to vim.vm.ReplicationConfigSpec.DiskSettings.
                          properties:
                            diskReplicationId:
                              description: |-
                                DiskReplicationId uniquely identifies the replicated disk between
                                primary and secondary sites.
                              type: string
                            key:
                              description: Key is the device key of the disk in the
                                VM's configuration.
                              format: int32
                              type: integer
                          required:
                          - diskReplicationId
                          - key
                          type: object
                        type: array
                      encryptionDestination:
                        description: |-
                          EncryptionDestination is the IP address of the encryption
                          tunnelling agent on the secondary site.
                        type: string
                      encryptionPort:
                        description: EncryptionPort is the port of the encryption
                          tunnelling agent.
                        format: int32
                        type: integer
                      generation:
                        description: |-
                          Generation is a number reflecting the freshness of the
                          replication configuration.
                        format: int64
                        type: integer
                      netCompressionEnabled:
                        description: |-
                          NetCompressionEnabled indicates whether compression is used when
                          sending replication traffic over the network.
                        type: boolean
                      netEncryptionEnabled:
                        description: |-
                          NetEncryptionEnabled indicates whether encryption is used when
                          sending replication traffic over the network.
                        type: boolean
                      oppUpdatesEnabled:
                        description: |-
                          OppUpdatesEnabled indicates whether to perform opportunistic
                          updates between consistent replicas.
                        type: boolean
                      paused:
                        description: |-
                          Paused indicates whether the VM or group has been paused for
                          replication.
                        type: boolean
                      port:
                        description: Port is the port on the HBR server in the secondary
                          site.
                        format: int32
                        type: integer
                      quiesceGuestEnabled:
                        description: |-
                          QuiesceGuestEnabled indicates whether to quiesce the guest file
                          system or applications before creating a consistent replica.
                        type: boolean
                      remoteCertificateThumbprint:
                        description: |-
                          RemoteCertificateThumbprint is the SHA256 thumbprint of the remote
                          server certificate, used when encryption is enabled.
                        type: string
                      rpo:
                        description: RPO is the Recovery Point Objective in minutes.
                        format: int64
                        type: integer
                      vmReplicationId:
                        description: |-
                          VMReplicationId uniquely identifies the replicated VM between
                          primary and secondary sites.
                        type: string
                    required:
                    - destination
                    - generation
                    - oppUpdatesEnabled
                    - paused
                    - port
                    - quiesceGuestEnabled
                    - rpo
                    - vmReplicationId
                    type: object
                  scheduledHardwareUpgradeInfo:
                    description: |-
                      ScheduledHardwareUpgradeInfo contains the configuration of
                      scheduled hardware upgrades and the result of the last attempt.
                    properties:
                      fault:
                        description: |-
                          Fault describes the failure of the last scheduled hardware upgrade
                          attempt, if any.
                        properties:
                          localizedMessage:
                            description: LocalizedMessage is a human-readable description
                              of the fault.
                            type: string
                        type: object
                      scheduledHardwareUpgradeStatus:
                        description: |-
                          ScheduledHardwareUpgradeStatus is the status of the last scheduled
                          hardware upgrade attempt.
                        type: string
                      upgradePolicy:
                        description: UpgradePolicy is the scheduled hardware upgrade
                          policy setting.
                        type: string
                      versionKey:
                        description: |-
                          VersionKey is the target hardware version key for the next
                          scheduled upgrade.
                        type: string
                    type: object
                  sevEnabled:
                    description: |-
                      SEVEnabled indicates whether SEV (Secure Encrypted Virtualization)
                      is enabled.
                    type: boolean
                  sevSnpEnabled:
                    description: |-
                      SEVSNPEnabled indicates whether SEV-SNP (Secure Encrypted
                      Virtualization Secure Nested Paging) is enabled.
                    type: boolean
                  sgxInfo:
                    description: |-
                      SgxInfo describes the virtual SGX configuration of the virtual
                      machine.
                    properties:
                      epcSize:
                        description: EpcSize is the size of the virtual Enclave Page
                          Cache in megabytes.
                        format: int64
                        type: integer
                      flcMode:
                        description: |-
                          FlcMode is the Flexible Launch Control mode. Defaults to
                          "unlocked" if unset.
                        type: string
                      lePubKeyHash:
                        description: |-
                          LePubKeyHash is the SHA256 digest of the provider launch enclave's
                          SIGSTRUCT.MODULUS. Only used when FlcMode is "locked".
                        type: string
                      requireAttestation:
                        description: |-
                          RequireAttestation indicates whether the virtual machine requires
                          remote attestation.
                        type: boolean
                    required:
                    - epcSize
                    type: object
                  swapPlacement:
                    description: SwapPlacement is the virtual machine swapfile placement
                      policy.
                    type: string
                  swapStorageObjectId:
                    description: |-
                      SwapStorageObjectID is the virtual machine swap object identifier
                      for object-based storage systems.
                    type: string
                  tdxEnabled:
                    description: |-
                      TDXEnabled indicates whether TDX (Trust Domain Extensions) is
                      enabled.
                    type: boolean
                  template:
                    description: Template indicates whether the virtual machine is
                      a template.
                    type: boolean
                  tools:
                    description: Tools is the VMware Tools configuration for the virtual
                      machine.
                    properties:
                      afterPowerOn:
                        description: |-
                          AfterPowerOn indicates whether scripts run after the virtual
                          machine powers on.
                        type: boolean
                      afterResume:
                        description: |-
                          AfterResume indicates whether scripts run after the virtual machine
                          resumes.
                        type: boolean
                      beforeGuestReboot:
                        description: |-
                          BeforeGuestReboot indicates whether scripts run before the virtual
                          machine reboots.
                        type: boolean
                      beforeGuestShutdown:
                        description: |-
                          BeforeGuestShutdown indicates whether scripts run before the
                          virtual machine powers off.
                        type: boolean
                      beforeGuestStandby:
                        description: |-
                          BeforeGuestStandby indicates whether scripts run before the
                          virtual machine suspends.
                        type: boolean
                      customizationKeyId:
                        description: |-
                          CustomizationKeyId is the ID of the key used to encrypt the
                          customization package attached to this VM.
                        properties:
                          keyId:
                            description: KeyId is the unique key ID.
                            type: string
                          providerId:
                            description: ProviderId identifies the provider that holds
                              the key.
                            properties:
                              id:
                                description: Id is the globally unique ID for the
                                  crypto key provider.
                                type: string
                            required:
                            - id
                            type: object
                        required:
                        - keyId
                        type: object
                      lastInstallInfo:
                        description: |-
                          LastInstallInfo describes the status of the last tools upgrade
                          attempt.
                        properties:
                          counter:
                            description: |-
                              Counter is the number of attempts made to upgrade VMware Tools on
                              this virtual machine.
                            format: int32
                            type: integer
                          fault:
                            description: Fault describes the error from the last upgrade
                              attempt, if any.
                            properties:
                              localizedMessage:
                                description: LocalizedMessage is a human-readable
                                  description of the fault.
                                type: string
                            type: object
                        required:
                        - counter
                        type: object
                      pendingCustomization:
                        description: |-
                          PendingCustomization is the filename of a pending customization
                          package on the host.
                        type: string
                      syncTimeWithHost:
                        description: |-
                          SyncTimeWithHost indicates whether VMware Tools periodically
                          synchronizes guest time with host time.
                        type: boolean
                      syncTimeWithHostAllowed:
                        description: |-
                          SyncTimeWithHostAllowed indicates whether VMware Tools is allowed
                          to synchronize guest time with host time.
                        type: boolean
                      toolsInstallType:
                        description: |-
                          ToolsInstallType is the installation type of VMware Tools in the
                          guest operating system.
                        type: string
                      toolsUpgradePolicy:
                        description: ToolsUpgradePolicy is the upgrade policy setting
                          for VMware Tools.
                        type: string
                      toolsVersion:
                        description: ToolsVersion is the version of VMware Tools installed
                          in the guest.
                        format: int32
                        type: integer
                    type: object
                  uuid:
                    description: |-
                      UUID is the 128-bit SMBIOS UUID of a virtual machine represented as
                      a hexadecimal string in "12345678-abcd-1234-cdef-123456789abc"
                      format.
                    type: string
                  vAssertsEnabled:
                    description: |-
                      VAssertsEnabled indicates whether user-configured virtual asserts
                      will be triggered during virtual machine replay.
                    type: boolean
                  vFlashCacheReservation:
                    description: |-
                      VFlashCacheReservation specifies the total vFlash resource
                      reservation for the vFlash caches associated with this VM's virtual
                      disks, in bytes.

                      Deprecated: since vSphere 7.0 because vFlash Read Cache end of
                      availability.
                    format: int64
                    type: integer
                  vPMCEnabled:
                    description: |-
                      VPMCEnabled indicates whether this VM has virtual CPU performance
                      counters enabled.
                    type: boolean
                  vcpuConfig:
                    description: |-
                      VCPUConfig is the per-vCPU configuration. The array is indexed by
                      vCPU number.
                    items:
                      description: |-
                        VirtualMachineVcpuConfig is the per-vCPU configuration.
                        It corresponds to vim.vm.VcpuConfig.
                      properties:
                        latencySensitivity:
                          description: |-
                            LatencySensitivity is the latency-sensitivity specification for
                            this vCPU.
                          properties:
                            level:
                              description: Level is the nominal latency-sensitivity
                                level.
                              type: string
                            sensitivity:
                              description: |-
                                Sensitivity is the custom absolute latency-sensitivity value in
                                microseconds. Only used when Level is "custom".

                                Deprecated: as of vSphere 5.5.
                              format: int32
                              type: integer
                          required:
                          - level
                          type: object
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  vmOpNotificationTimeout:
                    description: |-
                      VMOpNotificationTimeout is the operation notification timeout in
                      seconds.
                    format: int64
                    type: integer
                  vmOpNotificationToAppEnabled:
                    description: |-
                      VMOpNotificationToAppEnabled indicates whether operation
                      notification to applications is enabled.
                    type: boolean
                  vmStorageObjectId:
                    description: |-
                      VMStorageObjectID is the virtual machine object identifier for
                      object-based storage systems.
                    type: string
                  vmxConfigChecksum:
                    description: VMXConfigChecksum is a checksum of the VMX configuration
                      file.
                    format: byte
                    type: string
                  vmxStatsCollectionEnabled:
                    description: |-
                      VMXStatsCollectionEnabled indicates whether VMXStats collection is
                      enabled for this VM.
                    type: boolean
                required:
                - alternateGuestName
                - defaultPowerOps
                - files
                - guestFullName
                - guestId
                - hardware
                - hardwareVersion
                - name
                - template
                - uuid
                type: object
            type: object
          status:
            description: |-
              VirtualMachineStatus defines the observed state of a
              VirtualMachine.
            properties:
              conditions:
                description: Conditions describes any conditions associated with this
                  object.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              config:
                description: |-
                  VirtualMachineConfigInfoStatus encapsulates the observed state of the
                  configuration settings and virtual hardware for a virtual machine.
                  It corresponds to vim.vm.ConfigInfo.
                properties:
                  changeVersion:
                    description: |-
                      ChangeVersion is a unique identifier for a given version of the
                      configuration. Each change to the configuration updates this value.
                    type: string
                  createDate:
                    description: |-
                      CreateDate is the time the virtual machine's configuration was
                      created.
                    format: date-time
                    type: string
                  datastoreURL:
                    description: |-
                      DatastoreURL describes the observed set of datastores on which this VM
                      is stored, as well as the URL identification for each datastore.
                      Changes to datastores do not generate property updates on this
                      property. However, when this property is retrieved it returns the
                      current datastore information.
                    items:
                      properties:
                        name:
                          type: string
                        url:
                          type: string
                      required:
                      - name
                      - url
                      type: object
                    type: array
                  modified:
                    description: |-
                      Modified is the last time a virtual machine's configuration was
                      modified.
                    format: date-time
                    type: string
                  vmxRuntimeConfig:
                    description: |-
                      VMXRuntimeConfig contains properties established when the VM powers
                      on and examined when the VM is resumed to ensure compatibility with
                      the suspended device state. Only populated while the VM is powered on.
                    items:
                      description: |-
                        OptionValue is a key-value configuration parameter.
                        It corresponds to vim.option.OptionValue.
                      properties:
                        key:
                          description: Key is the option key.
                          type: string
                        value:
                          description: Value is the option value, encoded as a string.
                          type: string
                      required:
                      - key
                      - value
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                required:
                - changeVersion
                - modified
                type: object
              observedGeneration:
                description: |-
                  ObservedGeneration describes the value of the metadata.generation field
                  the last time this object was reconciled by its primary controller.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
