---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: virtualmachineconfigoptions.vim.vmware.com
spec:
  group: vim.vmware.com
  names:
    kind: VirtualMachineConfigOptions
    listKind: VirtualMachineConfigOptionsList
    plural: virtualmachineconfigoptions
    singular: virtualmachineconfigoptions
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          VirtualMachineConfigOptions is the schema for the
          VirtualMachineConfigOptions API and
          represents the desired state and observed status of a
          VirtualMachineConfigOptions resource.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              VirtualMachineConfigOptionsSpec defines the desired state of
              VirtualMachineConfigOptions.
            properties:
              hardwareVersion:
                description: |-
                  HardwareVersion is the desired hardware version for which to get the
                  config options, ex.: vmx-19.
                type: string
            required:
            - hardwareVersion
            type: object
          status:
            description: |-
              VirtualMachineConfigOptionsStatus defines the observed state of
              VirtualMachineConfigOptions.
            properties:
              capabilities:
                description: Capabilities describes the VM capabilities supported
                  by this configuration.
                properties:
                  bootOptionsSupported:
                    description: BootOptionsSupported indicates whether boot options
                      can be configured.
                    type: boolean
                  bootRetryOptionsSupported:
                    description: |-
                      BootRetryOptionsSupported indicates whether automatic boot retry can
                      be configured.
                    type: boolean
                  changeModeDisksSupported:
                    description: |-
                      ChangeModeDisksSupported indicates whether change mode on virtual disks
                      is supported.
                    type: boolean
                  changeTrackingSupported:
                    description: |-
                      ChangeTrackingSupported indicates whether disk change tracking is
                      supported. Even when supported, it may not be available for all disk
                      types (e.g., passthru RDMs).
                    type: boolean
                  consolePreferencesSupported:
                    description: |-
                      ConsolePreferencesSupported indicates whether console preferences can
                      be set for this virtual machine.
                    type: boolean
                  cpuFeatureMaskSupported:
                    description: |-
                      CpuFeatureMaskSupported indicates whether CPU feature requirement masks
                      can be set for this virtual machine.
                    type: boolean
                  diskOnlySnapshotOnSuspendedVMSupported:
                    description: |-
                      DiskOnlySnapshotOnSuspendedVMSupported indicates whether disk-only
                      snapshots can be created while the virtual machine is suspended.
                    type: boolean
                  diskSharesSupported:
                    description: |-
                      DiskSharesSupported indicates whether resource settings for disks can
                      be applied to this virtual machine.
                    type: boolean
                  featureRequirementSupported:
                    description: |-
                      FeatureRequirementSupported indicates whether the featureRequirement
                      feature is supported.
                    type: boolean
                  guestAutoLockSupported:
                    description: |-
                      GuestAutoLockSupported indicates whether guest OS auto-lock and MKS
                      connection controls are supported.
                    type: boolean
                  hostBasedReplicationSupported:
                    description: |-
                      HostBasedReplicationSupported indicates whether host-based replication
                      is supported.
                    type: boolean
                  lockSnapshotsSupported:
                    description: |-
                      LockSnapshotsSupported indicates whether the snapshot tree can be
                      locked.
                    type: boolean
                  memoryReservationLockSupported:
                    description: |-
                      MemoryReservationLockSupported indicates whether
                      memoryReservationLockedToMax may be set to true for this virtual
                      machine.
                    type: boolean
                  memorySnapshotsSupported:
                    description: |-
                      MemorySnapshotsSupported indicates whether memory snapshots are
                      supported.
                    type: boolean
                  multipleCoresPerSocketSupported:
                    description: |-
                      MultipleCoresPerSocketSupported indicates whether multiple cores per
                      socket is supported.
                    type: boolean
                  multipleSnapshotsSupported:
                    description: |-
                      MultipleSnapshotsSupported indicates whether multiple snapshots are
                      supported.
                    type: boolean
                  nestedHVSupported:
                    description: |-
                      NestedHVSupported indicates whether nested hardware-assisted
                      virtualization is supported.
                    type: boolean
                  npivWwnOnNonRdmVmSupported:
                    description: |-
                      NpivWwnOnNonRdmVmSupported indicates whether assigning NPIV WWN to
                      virtual machines without RDM disks is supported.
                    type: boolean
                  perVmEvcSupported:
                    description: PerVmEvcSupported indicates whether Per-VM EVC mode
                      is supported.
                    type: boolean
                  poweredOffSnapshotsSupported:
                    description: |-
                      PoweredOffSnapshotsSupported indicates whether snapshot operations are
                      supported in the powered-off state.
                    type: boolean
                  poweredOnMonitorTypeChangeSupported:
                    description: |-
                      PoweredOnMonitorTypeChangeSupported indicates whether a monitor type
                      change is supported while the virtual machine is powered on.
                    type: boolean
                  quiescedSnapshotsSupported:
                    description: |-
                      QuiescedSnapshotsSupported indicates whether quiesced snapshots are
                      supported.
                    type: boolean
                  requireSgxAttestationSupported:
                    description: |-
                      RequireSgxAttestationSupported indicates whether requiring SGX remote
                      attestation is supported.
                    type: boolean
                  revertToSnapshotSupported:
                    description: |-
                      RevertToSnapshotSupported indicates whether reverting to a snapshot is
                      supported.
                    type: boolean
                  s1AcpiManagementSupported:
                    description: |-
                      S1AcpiManagementSupported indicates whether ACPI S1 settings management
                      is supported.
                    type: boolean
                  seSparseDiskSupported:
                    description: |-
                      SeSparseDiskSupported indicates whether the Flex-SE (space-efficient,
                      sparse) format is supported for virtual disks.
                    type: boolean
                  secureBootSupported:
                    description: SecureBootSupported indicates whether Secure Boot
                      is supported.
                    type: boolean
                  settingDisplayTopologySupported:
                    description: |-
                      SettingDisplayTopologySupported indicates whether the console display
                      topology can be configured.
                    type: boolean
                  settingScreenResolutionSupported:
                    description: |-
                      SettingScreenResolutionSupported indicates whether the console screen
                      resolution can be configured.
                    type: boolean
                  settingVideoRamSizeSupported:
                    description: |-
                      SettingVideoRamSizeSupported indicates whether the video RAM size can
                      be configured.
                    type: boolean
                  sevSnpSupported:
                    description: |-
                      SEVSNPSupported indicates whether AMD SEV-SNP (Secure Encrypted
                      Virtualization - Secure Nested Paging) is supported.
                    type: boolean
                  sevSupported:
                    description: |-
                      SEVSupported indicates whether AMD SEV (Secure Encrypted
                      Virtualization) is supported.
                    type: boolean
                  snapshotConfigSupported:
                    description: |-
                      SnapshotConfigSupported indicates whether snapshot configuration is
                      supported.
                    type: boolean
                  snapshotOperationsSupported:
                    description: |-
                      SnapshotOperationsSupported indicates whether snapshot operations are
                      supported.
                    type: boolean
                  suspendToMemorySupported:
                    description: |-
                      SuspendToMemorySupported indicates whether suspending to memory is
                      supported.
                    type: boolean
                  swapPlacementSupported:
                    description: |-
                      SwapPlacementSupported indicates whether a configurable swapfile
                      placement policy is supported.
                    type: boolean
                  tdxSupported:
                    description: |-
                      TDXSupported indicates whether Intel TDX (Trusted Domain Extensions)
                      is supported.
                    type: boolean
                  toolsAutoUpdateSupported:
                    description: |-
                      ToolsAutoUpdateSupported indicates whether VMware Tools auto-update is
                      supported.
                    type: boolean
                  toolsSyncTimeAllowSupported:
                    description: |-
                      ToolsSyncTimeAllowSupported indicates support for allowing or
                      disallowing all tools time synchronization with the host.
                    type: boolean
                  toolsSyncTimeSupported:
                    description: |-
                      ToolsSyncTimeSupported indicates whether asking tools to sync time with
                      the host is supported.
                    type: boolean
                  vendorDeviceGroupSupported:
                    description: |-
                      VendorDeviceGroupSupported indicates whether Vendor Device Groups are
                      supported.
                    type: boolean
                  virtualExecUsageIgnored:
                    description: |-
                      VirtualExecUsageIgnored indicates that VirtualMachineFlagInfo.virtualExecUsage
                      is ignored, always operating as if "hvOn" was selected.
                    type: boolean
                  virtualMmuUsageIgnored:
                    description: |-
                      VirtualMmuUsageIgnored indicates that VirtualMachineFlagInfo.virtualMmuUsage
                      is ignored, always operating as if "on" was selected.
                    type: boolean
                  virtualMmuUsageSupported:
                    description: |-
                      VirtualMmuUsageSupported indicates whether the use of nested page table
                      hardware support can be explicitly set.
                    type: boolean
                  vmNpivWwnDisableSupported:
                    description: |-
                      VmNpivWwnDisableSupported indicates whether disabling NPIV on the
                      virtual machine is supported.
                    type: boolean
                  vmNpivWwnSupported:
                    description: |-
                      VmNpivWwnSupported indicates whether virtual machine NPIV WWN is
                      supported.
                    type: boolean
                  vmNpivWwnUpdateSupported:
                    description: |-
                      VmNpivWwnUpdateSupported indicates whether updating NPIV WWNs on the
                      virtual machine is supported.
                    type: boolean
                  vpmcSupported:
                    description: |-
                      VPMCSupported indicates whether virtualized CPU performance counters
                      are supported.
                    type: boolean
                type: object
              conditions:
                description: Conditions describes any conditions associated with this
                  object.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              defaultDevices:
                description: |-
                  DefaultDevices lists the type names of virtual devices created on a
                  virtual machine by default. Clients should not create these devices
                  explicitly.
                items:
                  description: |-
                    VirtualDevice is the base data object type for devices in a virtual machine.
                    It corresponds to vim.vm.device.VirtualDevice.
                  properties:
                    backing:
                      description: Backing describes the device's backing information.
                      properties:
                        device:
                          description: Device contains host device backing information.
                          properties:
                            cdromPassthrough:
                              description: |-
                                VirtualCdromPassthroughBackingInfo defines device pass-through backing for a
                                virtual CD-ROM.
                                It corresponds to vim.vm.device.VirtualCdrom.PassthroughBackingInfo.
                              properties:
                                exclusive:
                                  description: |-
                                    Exclusive indicates whether the virtual machine has exclusive CD-ROM
                                    device access.
                                  type: boolean
                              required:
                              - exclusive
                              type: object
                            deviceName:
                              description: DeviceName is the name of the device on
                                the host system.
                              type: string
                            diskRawDiskVer2:
                              description: |-
                                VirtualDiskRawDiskVer2BackingInfo defines raw host device (VMware Server)
                                backing for a virtual disk.
                                It corresponds to vim.vm.device.VirtualDisk.RawDiskVer2BackingInfo.
                              properties:
                                changeId:
                                  description: ChangeId is the change ID for tracking
                                    incremental changes.
                                  type: string
                                descriptorFileName:
                                  description: DescriptorFileName is the name of the
                                    raw disk descriptor file.
                                  type: string
                                partitioned:
                                  description: |-
                                    VirtualDiskPartitionedRawDiskVer2BackingInfo defines partitioned raw host
                                    device backing for a virtual disk.
                                    It corresponds to vim.vm.device.VirtualDisk.PartitionedRawDiskVer2BackingInfo.
                                  properties:
                                    partition:
                                      description: Partition is the list of partition
                                        indexes on the physical disk drive.
                                      items:
                                        format: int32
                                        type: integer
                                      type: array
                                  required:
                                  - partition
                                  type: object
                                sharing:
                                  description: Sharing is the sharing mode of the
                                    virtual disk.
                                  type: string
                                uuid:
                                  description: Uuid is the disk UUID.
                                  type: string
                              required:
                              - descriptorFileName
                              type: object
                            ethernetCardNetwork:
                              description: |-
                                VirtualEthernetCardNetworkBackingInfo defines standard network backing for
                                a virtual Ethernet card.
                                It corresponds to vim.vm.device.VirtualEthernetCard.NetworkBackingInfo.
                              properties:
                                network:
                                  description: |-
                                    ManagedObjectReference is a referenced to a managed object on a given
                                    vSphere instance.
                                  properties:
                                    id:
                                      description: ID is the object's ID.
                                      type: string
                                    serverID:
                                      description: ServerID is the ID of the server
                                        to which the object belongs.
                                      type: string
                                    type:
                                      description: Type is the object's type.
                                      type: string
                                  required:
                                  - id
                                  - type
                                  type: object
                              type: object
                            pciPassthroughDevice:
                              description: |-
                                VirtualPCIPassthroughDeviceBackingInfo contains information about the host
                                PCI device backing for a PCI passthrough device.
                                It corresponds to vim.vm.device.VirtualPCIPassthrough.DeviceBackingInfo.
                              properties:
                                deviceId:
                                  description: DeviceId is the PCI device ID.
                                  type: string
                                id:
                                  description: Id is the PCI name ID, composed of
                                    "bus:slot.function".
                                  type: string
                                systemId:
                                  description: SystemId is the ID of the system the
                                    PCI device is attached to.
                                  type: string
                                vendorId:
                                  description: VendorId is the PCI vendor ID.
                                  type: integer
                              required:
                              - deviceId
                              - id
                              - systemId
                              - vendorId
                              type: object
                            pciPassthroughDynamic:
                              description: |-
                                VirtualPCIPassthroughDynamicBackingInfo contains information about the
                                Dynamic DirectPath PCI device backing.
                                It corresponds to vim.vm.device.VirtualPCIPassthrough.DynamicBackingInfo.
                              properties:
                                allowedDevice:
                                  description: |-
                                    AllowedDevice lists the allowed PCI devices for this Dynamic DirectPath
                                    device.
                                  items:
                                    description: |-
                                      VirtualPCIPassthroughAllowedDevice specifies an allowed PCI device for
                                      Dynamic DirectPath.
                                      It corresponds to vim.vm.device.VirtualPCIPassthrough.AllowedDevice.
                                    properties:
                                      deviceId:
                                        description: DeviceId is the PCI device ID.
                                        format: int32
                                        type: integer
                                      revisionId:
                                        description: RevisionId is the PCI revision
                                          ID.
                                        format: int32
                                        type: integer
                                      subDeviceId:
                                        description: SubDeviceId is the PCI subdevice
                                          ID.
                                        format: int32
                                        type: integer
                                      subVendorId:
                                        description: SubVendorId is the PCI subvendor
                                          ID.
                                        format: int32
                                        type: integer
                                      vendorId:
                                        description: VendorId is the PCI vendor ID.
                                        format: int32
                                        type: integer
                                    required:
                                    - deviceId
                                    - vendorId
                                    type: object
                                  type: array
                                assignedId:
                                  description: AssignedId is the ID of the device
                                    assigned when the VM is powered on.
                                  type: string
                                customLabel:
                                  description: CustomLabel is an optional label that
                                    the device must also have set.
                                  type: string
                              type: object
                            pointingDeviceDevice:
                              description: |-
                                VirtualPointingDeviceDeviceBackingInfo defines host mouse device backing for
                                a virtual pointing device.
                                It corresponds to vim.vm.device.VirtualPointingDevice.DeviceBackingInfo.
                              properties:
                                hostPointingDevice:
                                  description: |-
                                    HostPointingDevice defines the mouse type used to interact with the
                                    host mouse.
                                  type: string
                              required:
                              - hostPointingDevice
                              type: object
                            usbRemoteHost:
                              description: |-
                                VirtualUSBRemoteHostBackingInfo identifies a USB device on a specific ESX
                                host, supporting persistent access across vMotion.
                                It corresponds to vim.vm.device.VirtualUSB.RemoteHostBackingInfo.
                              properties:
                                hostname:
                                  description: |-
                                    Hostname is the name of the ESX host to which the physical USB device
                                    is attached.
                                  type: string
                              required:
                              - hostname
                              type: object
                            useAutoDetect:
                              description: |-
                                UseAutoDetect indicates whether the device should be auto-detected
                                instead of directly specified. When true, DeviceName is ignored.
                              type: boolean
                          type: object
                          x-kubernetes-validations:
                          - message: at most one of cdromPassthrough, diskRawDiskVer2,
                              ethernetCardNetwork, pciPassthroughDevice, pciPassthroughDynamic,
                              pointingDeviceDevice, or usbRemoteHost may be specified
                            rule: '[has(self.cdromPassthrough), has(self.diskRawDiskVer2),
                              has(self.ethernetCardNetwork), has(self.pciPassthroughDevice),
                              has(self.pciPassthroughDynamic), has(self.pointingDeviceDevice),
                              has(self.usbRemoteHost)].filter(x, x).size() <= 1'
                        ethernetCardDistributedVirtualPort:
                          description: |-
                            EthernetCardDistributedVirtualPort contains DVS port backing
                            information for virtual Ethernet cards.
                          properties:
                            port:
                              description: Port is the distributed virtual switch
                                port or portgroup connection.
                              properties:
                                connectionCookie:
                                  description: |-
                                    ConnectionCookie is a unique identifier for this port connection
                                    instance, assigned by the server.
                                  format: int32
                                  type: integer
                                portKey:
                                  description: |-
                                    PortKey is the key of the specific port. Specify this to connect to a
                                    particular port rather than a portgroup.
                                  type: string
                                portgroupKey:
                                  description: |-
                                    PortgroupKey is the key of the portgroup. Specify this to connect to a
                                    portgroup rather than a specific port.
                                  type: string
                                switchUuid:
                                  description: SwitchUuid is the UUID of the distributed
                                    virtual switch.
                                  type: string
                              required:
                              - switchUuid
                              type: object
                          required:
                          - port
                          type: object
                        ethernetCardOpaqueNetwork:
                          description: |-
                            EthernetCardOpaqueNetwork contains opaque network backing
                            information for virtual Ethernet cards.
                          properties:
                            opaqueNetworkId:
                              description: OpaqueNetworkId is the opaque network identifier.
                              type: string
                            opaqueNetworkType:
                              description: OpaqueNetworkType is the opaque network
                                type.
                              type: string
                          required:
                          - opaqueNetworkId
                          - opaqueNetworkType
                          type: object
                        file:
                          description: File contains host file backing information.
                          properties:
                            backingObjectId:
                              description: |-
                                BackingObjectId is the backing object's durable and immutable
                                identifier.
                              type: string
                            fileName:
                              description: FileName is the filename for the host file
                                used in this backing.
                              type: string
                            nvdimm:
                              description: |-
                                VirtualNVDIMMBackingInfo contains information about the file backing for a
                                virtual NVDIMM device.
                                It corresponds to vim.vm.device.VirtualNVDIMM.BackingInfo.
                              properties:
                                changeId:
                                  description: |-
                                    ChangeId is the change ID of the virtual NVDIMM for the corresponding
                                    snapshot, used to track incremental changes.
                                  type: string
                                parent:
                                  type: object
                                  x-kubernetes-preserve-unknown-fields: true
                              type: object
                            virtualDiskFlatVer1:
                              description: |-
                                VirtualDiskFlatVer1BackingInfo defines flat-format (GSX Server 2.x) file
                                backing for a virtual disk.
                                It corresponds to vim.vm.device.VirtualDisk.FlatVer1BackingInfo.
                              properties:
                                contentId:
                                  description: |-
                                    ContentId indicates the logical contents of the disk backing and its
                                    parents.
                                  type: string
                                diskMode:
                                  description: DiskMode is the disk persistence mode.
                                  type: string
                                parent:
                                  description: Parent is the parent backing if this
                                    is a delta disk backing.
                                  type: object
                                  x-kubernetes-preserve-unknown-fields: true
                                split:
                                  description: |-
                                    Split indicates whether the virtual disk is stored in multiple 2 GB
                                    files.
                                  type: boolean
                                writeThrough:
                                  description: |-
                                    WriteThrough indicates whether writes go directly to the file system
                                    or are buffered.
                                  type: boolean
                              required:
                              - diskMode
                              type: object
                            virtualDiskFlatVer2:
                              description: |-
                                VirtualDiskFlatVer2BackingInfo defines flat-format (ESX Server 2.x/3.x)
                                file backing for a virtual disk.
                                It corresponds to vim.vm.device.VirtualDisk.FlatVer2BackingInfo.
                              properties:
                                changeId:
                                  description: ChangeId is the change ID for tracking
                                    incremental changes.
                                  type: string
                                contentId:
                                  description: |-
                                    ContentId indicates the logical contents of the disk backing and its
                                    parents.
                                  type: string
                                deltaDiskFormat:
                                  description: DeltaDiskFormat is the format of the
                                    delta disk.
                                  type: string
                                deltaDiskFormatVariant:
                                  description: |-
                                    DeltaDiskFormatVariant provides more detailed information for the delta
                                    disk format.
                                  type: string
                                deltaGrainSize:
                                  anyOf:
                                  - type: integer
                                  - type: string
                                  description: DeltaGrainSize is the grain size for
                                    seSparseFormat delta disks.
                                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                  x-kubernetes-int-or-string: true
                                digestEnabled:
                                  description: |-
                                    DigestEnabled indicates whether the disk backing has digest file
                                    enabled.
                                  type: boolean
                                diskMode:
                                  description: DiskMode is the disk persistence mode.
                                  type: string
                                eagerlyScrub:
                                  description: |-
                                    EagerlyScrub indicates whether the backing file is completely scrubbed
                                    at creation time.
                                  type: boolean
                                keyId:
                                  description: KeyId is the encryption key identifier
                                    for this disk backing.
                                  properties:
                                    keyId:
                                      description: KeyId is the unique key ID.
                                      type: string
                                    providerId:
                                      description: ProviderId identifies the provider
                                        that holds the key.
                                      properties:
                                        id:
                                          description: Id is the globally unique ID
                                            for the crypto key provider.
                                          type: string
                                      required:
                                      - id
                                      type: object
                                  required:
                                  - keyId
                                  type: object
                                parent:
                                  description: Parent is the parent backing if this
                                    is a delta disk backing.
                                  type: object
                                  x-kubernetes-preserve-unknown-fields: true
                                sharing:
                                  description: Sharing is the sharing mode of the
                                    virtual disk.
                                  type: string
                                split:
                                  description: |-
                                    Split indicates whether the virtual disk is stored in multiple 2 GB
                                    files.
                                  type: boolean
                                thinProvisioned:
                                  description: ThinProvisioned indicates whether the
                                    virtual disk is thin-provisioned.
                                  type: boolean
                                uuid:
                                  description: Uuid is the disk UUID.
                                  type: string
                                writeThrough:
                                  description: |-
                                    WriteThrough indicates whether writes go directly to the file system
                                    or are buffered.
                                  type: boolean
                              required:
                              - diskMode
                              type: object
                            virtualDiskLocalPMem:
                              description: |-
                                VirtualDiskLocalPMemBackingInfo defines persistent memory (PMem) file
                                backing for a virtual disk.
                                It corresponds to vim.vm.device.VirtualDisk.LocalPMemBackingInfo.
                              properties:
                                contentId:
                                  description: |-
                                    ContentId indicates the logical contents of the disk backing and its
                                    parents.
                                  type: string
                                diskMode:
                                  description: DiskMode is the disk persistence mode.
                                  type: string
                                uuid:
                                  description: Uuid is the disk UUID.
                                  type: string
                                volumeUUID:
                                  description: |-
                                    VolumeUUID is the persistent memory volume UUID associating this
                                    virtual disk with a specific host.
                                  type: string
                              required:
                              - diskMode
                              type: object
                            virtualDiskRawDiskMappingVer1:
                              description: |-
                                VirtualDiskRawDiskMappingVer1BackingInfo defines raw device mapping (RDM)
                                file backing for a virtual disk.
                                It corresponds to vim.vm.device.VirtualDisk.RawDiskMappingVer1BackingInfo.
                              properties:
                                changeId:
