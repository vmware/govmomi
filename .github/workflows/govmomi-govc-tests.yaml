name: Tests (govc)

permissions:
  contents: read
  actions: read

on:
  push:
    branches: main
  pull_request:
    branches: main

concurrency:
  group: govmomi-govc-tests-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  govc-tests:
    name: Run govc Tests
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.26"]
        platform: [ubuntu-latest]
        cmd: [govc-test]
        experimental: [false]
        timeout: [20]

    runs-on: ${{ matrix.platform }}
    continue-on-error: ${{ matrix.experimental }}
    timeout-minutes: ${{ matrix.timeout }}

    steps:
      - name: Check Repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
        id: go

      - name: Restore Go Cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-

      - name: Run ${{ matrix.cmd }}
        run: |
          make ${{ matrix.cmd }}

  govc-docs:
    name: Verify Updated Docs
    strategy:
      matrix:
        go-version: ["1.26"]
        platform: [ubuntu-latest]
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 3
    steps:
      - name: Check Repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
        id: go

      - name: Restore Go Cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-

      - name: Run "make doc"
        run: |
          make doc
          if [ -z "$(git status --porcelain)" ]; then
            echo "govc/USAGE.md is up2date..."
          else
            echo "dirty working directory (diff):"
            git --no-pager diff
            echo "::error file=govc/USAGE.md::Run make doc to update USAGE.md"
            exit 1
          fi
